spring.application.name=daterra
# Datos de conexión a AWS RDS
spring.datasource.url=jdbc:mysql://daterra.c7u4mm440l9t.us-east-2.rds.amazonaws.com:3306/Daterra
spring.datasource.username=admin
spring.datasource.password=daterra123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
# 'update' creará las tablas automáticamente si no existen
# Esto ayuda a ver en la consola de IntelliJ qué tabla está buscando exactamente
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Esto evita que Hibernate convierta USUARIO en usuario
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

